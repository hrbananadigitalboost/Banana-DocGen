services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: bdb
      POSTGRES_PASSWORD: bdb
      POSTGRES_DB: bdb_docgen
    ports:
      - "5432:5432"
    volumes:
      - bdb_postgres_data:/var/lib/postgresql/data

volumes:
  bdb_postgres_data:
